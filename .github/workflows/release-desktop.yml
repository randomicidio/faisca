name: Release Desktop Apps

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.1"
        required: true

permissions:
  contents: write

jobs:
  windows:
    name: Build and upload Windows
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      CHECKOUT_REF: ${{ github.event.release.tag_name || github.sha }}
      FAISCA_SECRETS_LOCAL_JSON: ${{ secrets.FAISCA_SECRETS_LOCAL_JSON }}

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Preparar segredo local
        shell: pwsh
        run: |
          if ($env:FAISCA_SECRETS_LOCAL_JSON) {
            New-Item -ItemType Directory -Force electron | Out-Null
            Set-Content -Path electron/secrets.local.json -Value $env:FAISCA_SECRETS_LOCAL_JSON -Encoding UTF8
          }

      - name: Ler versao da release
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Preparar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Gerar app de Windows
        shell: pwsh
        run: dotnet publish desktop-win/Faisca.csproj -c Release "-p:Version=$env:APP_VERSION" -o dist-webview2/Faisca-Leve

      - name: Conferir segredo no app Windows
        shell: pwsh
        run: |
          $dll = "desktop-win/bin/Release/net10.0-windows/win-x64/Faisca.dll"
          if (!(Test-Path $dll)) { throw "Faisca.dll nao encontrado para conferencia." }
          $asm = [System.Reflection.Assembly]::LoadFile((Resolve-Path $dll))
          $resource = $asm.GetManifestResourceNames() | Where-Object { $_ -eq "faisca.segredos" }
          if (!$resource) { throw "client_secret nao foi embutido no app Windows." }

      - name: Publicar .exe na release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload $env:RELEASE_TAG "dist-webview2/Faisca-Leve/Faisca.exe#Faisca.exe (Windows, Portable)" --clobber

  mac:
    name: Build and upload Mac
    runs-on: macos-latest
    needs: windows
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      CHECKOUT_REF: ${{ github.event.release.tag_name || github.sha }}
      FAISCA_SECRETS_LOCAL_JSON: ${{ secrets.FAISCA_SECRETS_LOCAL_JSON }}

    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Ler versao da release
        run: |
          echo "APP_VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Aplicar versao no pacote Mac
        run: |
          node -e "const fs=require('fs'); const f='package.json'; const p=JSON.parse(fs.readFileSync(f,'utf8')); p.version=process.env.APP_VERSION; fs.writeFileSync(f, JSON.stringify(p,null,2)+'\n');"

      - name: Preparar segredo local
        run: |
          if [ -n "$FAISCA_SECRETS_LOCAL_JSON" ]; then
            mkdir -p electron
            printf '%s' "$FAISCA_SECRETS_LOCAL_JSON" > electron/secrets.local.json
          fi

      - name: Criar icone do Mac
        run: |
          mkdir -p build/icon.iconset
          sips -z 16 16 icons/icon-512.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32 icons/icon-512.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 icons/icon-512.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64 icons/icon-512.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icons/icon-512.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256 icons/icon-512.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icons/icon-512.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512 icons/icon-512.png --out build/icon.iconset/icon_256x256@2x.png
          cp icons/icon-512.png build/icon.iconset/icon_512x512.png
          cp icons/icon-512.png build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o icons/faisca.icns

      - name: Gerar app de Mac
        run: npm run build:mac -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Conferir segredo no app Mac
        run: |
          app="dist/mac-arm64/Faísca.app"
          if [ ! -f "$app/Contents/Resources/app/electron/secrets.local.json" ]; then
            echo "client_secret nao foi incluido no app Mac."
            find "$app/Contents/Resources" -maxdepth 4 -type f | sort
            exit 1
          fi

      - name: Publicar Mac na release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" "dist/Mac-Faisca-${APP_VERSION}-arm64.dmg#Mac-Faisca-${APP_VERSION}-arm64.dmg (Mac, Apple Silicon)" --clobber
